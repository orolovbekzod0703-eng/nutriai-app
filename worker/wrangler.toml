name = "nutriai-proxy"
main = "src/index.js"
compatibility_date = "2025-01-01"

# Cloudflare Workers AI (bepul) — rasm/matn tahlili shu orqali
[ai]
binding = "AI"

# Firestore/Firebase loyiha ID (token tekshiruvi uchun)
[vars]
FIREBASE_PROJECT_ID = "fit-counter-ai"
ALLOWED_ORIGIN = "https://orolovbekzod0703-eng.github.io"

# Kunlik limit hisoblagichi uchun KV ombori.
# `npx wrangler kv namespace create RL` buyrug'i bergan id ni shu yerga qo'ying:
[[kv_namespaces]]
binding = "RL"
id = "baee35b62e8347c4b91674e260811122"

# GEMINI_API_KEY — bu yerga YOZMANG! Uni secret sifatida qo'shasiz:
#   npx wrangler secret put GEMINI_API_KEY
